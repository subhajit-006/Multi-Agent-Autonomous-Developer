<svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Top left corner structure -->
  <circle cx="25" cy="25" r="8" fill="#D4FF33"/>
  <line x1="25" y1="33" x2="25" y2="50" stroke="#D4FF33" stroke-width="4" stroke-linecap="round"/>
  <line x1="25" y1="50" x2="50" y2="65" stroke="#D4FF33" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Top right corner structure -->
  <circle cx="75" cy="25" r="8" fill="#D4FF33"/>
  <line x1="75" y1="33" x2="50" y2="50" stroke="#D4FF33" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="65" stroke="#D4FF33" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Center bottom node -->
  <circle cx="50" cy="65" r="8" fill="#D4FF33"/>
  
  <!-- Left branch -->
  <circle cx="15" cy="50" r="6" fill="#D4FF33"/>
  <line x1="21" y1="50" x2="25" y2="50" stroke="#D4FF33" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right branch -->
  <circle cx="85" cy="50" r="6" fill="#D4FF33"/>
  <line x1="75" y1="50" x2="79" y2="50" stroke="#D4FF33" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bottom left -->
  <circle cx="25" cy="80" r="6" fill="#D4FF33"/>
  <line x1="25" y1="73" x2="25" y2="80" stroke="#D4FF33" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bottom right -->
  <circle cx="75" cy="80" r="6" fill="#D4FF33"/>
  <line x1="75" y1="73" x2="75" y2="80" stroke="#D4FF33" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Connection lines -->
  <line x1="25" y1="50" x2="50" y2="50" stroke="#D4FF33" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="50" x2="75" y2="50" stroke="#D4FF33" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
